services:
  - type: web
    name: work-assistant-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: COZE_SUPABASE_URL
        sync: false
      - key: COZE_SUPABASE_ANON_KEY
        sync: false
      - key: COZE_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORT
        value: 3000
